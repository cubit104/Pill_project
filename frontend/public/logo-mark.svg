<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="ps-mark-title">
  <title id="ps-mark-title">PillSeek</title>
  <defs>
    <!--
      PillSeek logo mark — 512×512 viewBox, 8% safe padding (~41px on each side)
      Primary variant: sky-700 (#0369a1) on sky-100 (#e0f2fe) — use on light backgrounds.
      Magnifying glass is the hero shape; capsule pill sits inside the lens.
    -->
    <clipPath id="ps-lens-clip">
      <circle cx="220" cy="215" r="130"/>
    </clipPath>
  </defs>

  <!-- Lens fill (sky-100) -->
  <circle cx="220" cy="215" r="150" fill="#e0f2fe"/>

  <!-- Capsule pill inside the lens, tilted 15° for dynamism -->
  <g transform="translate(220,215) rotate(15)" clip-path="url(#ps-lens-clip)">
    <!-- Left half: sky-700 solid -->
    <path d="M 0,-13 L -46,-13 A 13,13 0 0,0 -46,13 L 0,13 Z" fill="#0369a1"/>
    <!-- Right half: white -->
    <path d="M 0,-13 L 46,-13 A 13,13 0 0,1 46,13 L 0,13 Z" fill="#ffffff"/>
    <!-- Full capsule outline (sky-700) -->
    <rect x="-59" y="-13" width="118" height="26" rx="13" fill="none" stroke="#0369a1" stroke-width="8"/>
    <!-- Glossy highlight on sky-700 half -->
    <path d="M -54,-4 Q -27,-9 -4,-4" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.75"/>
  </g>

  <!-- Magnifying glass ring — drawn after capsule so ring cleanly frames it -->
  <circle cx="220" cy="215" r="150" fill="none" stroke="#0369a1" stroke-width="36"/>

  <!-- Handle: rounded stroke extending at 45° from lower-right of circle -->
  <line x1="324" y1="319" x2="404" y2="399"
        stroke="#0369a1" stroke-width="42" stroke-linecap="round"/>
</svg>
